<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Tracker</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #6c63ff;
    --accent2: #00d4aa;
    --accent3: #ff6b6b;
    --accent4: #ffd166;
    --text: #e8eaf6;
    --text-muted: #7b82a8;
    --success: #00d4aa;
    --warning: #ffd166;
    --danger: #ff6b6b;
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
  }
  /* Header */
  .header {
    background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 16px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top { display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.3px; }
  .header h1 span { color: var(--accent); }
  .header-sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
  .sync-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.2s;
  }
  .sync-btn:hover { border-color: var(--accent); color: var(--accent); }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }
  .sync-dot.loading { background: var(--warning); animation: pulse 1s infinite; }
  .sync-dot.error { background: var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Nav */
  .nav {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .nav::-webkit-scrollbar { display: none; }
  .nav-btn {
    flex: 1;
    min-width: 80px;
    padding: 12px 8px;
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.3px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .nav-btn:hover:not(.active) { color: var(--text); }

  /* Content */
  .content { padding: 16px; max-width: 600px; margin: 0 auto; }
  .section { display: none; }
  .section.active { display: block; }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .card-title {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  .card-title span { margin-right: 6px; }

  /* Progress bar */
  .progress-wrap { margin: 10px 0; }
  .progress-label { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .progress-name { font-size: 0.9rem; font-weight: 600; }
  .progress-pct { font-size: 0.75rem; color: var(--text-muted); }
  .progress-bar {
    height: 8px;
    background: var(--surface2);
    border-radius: 20px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 20px;
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  }
  .progress-detail { display: flex; justify-content: space-between; margin-top: 5px; }
  .progress-detail span { font-size: 0.72rem; color: var(--text-muted); }
  .progress-detail strong { color: var(--text); }

  /* Goal cards */
  .goal-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
    margin-bottom: 10px;
  }
  .goal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .goal-name { font-weight: 700; font-size: 0.95rem; }
  .goal-badge {
    font-size: 0.65rem;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .badge-active { background: rgba(108,99,255,0.2); color: var(--accent); }
  .badge-upcoming { background: rgba(255,209,102,0.15); color: var(--warning); }
  .badge-paused { background: rgba(123,130,168,0.15); color: var(--text-muted); }
  .badge-done { background: rgba(0,212,170,0.15); color: var(--success); }

  /* Stat grid */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .stat-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
  }
  .stat-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .stat-value { font-size: 1.1rem; font-weight: 700; }
  .stat-value.green { color: var(--success); }
  .stat-value.yellow { color: var(--warning); }
  .stat-value.red { color: var(--danger); }
  .stat-value.purple { color: var(--accent); }

  /* Bucket rows */
  .bucket-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .bucket-row:last-child { border-bottom: none; }
  .bucket-left { display: flex; flex-direction: column; gap: 2px; }
  .bucket-name { font-weight: 600; font-size: 0.9rem; }
  .bucket-sub { font-size: 0.72rem; color: var(--text-muted); }
  .bucket-right { text-align: right; }
  .bucket-alloc { font-size: 0.75rem; color: var(--text-muted); }
  .bucket-balance { font-weight: 700; font-size: 1rem; }

  /* Actuals */
  .actual-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .actual-row:last-child { border-bottom: none; }
  .actual-cat { font-size: 0.85rem; font-weight: 500; }
  .actual-right { display: flex; align-items: center; gap: 10px; }
  .actual-budget { font-size: 0.72rem; color: var(--text-muted); }
  .actual-val { font-weight: 700; font-size: 0.9rem; min-width: 60px; text-align: right; }
  .actual-diff { font-size: 0.7rem; font-weight: 600; }
  .diff-over { color: var(--danger); }
  .diff-under { color: var(--success); }

  /* Phase timeline */
  .phase-item {
    display: flex;
    gap: 14px;
    padding-bottom: 20px;
    position: relative;
  }
  .phase-item:not(:last-child)::before {
    content: '';
    position: absolute;
    left: 15px;
    top: 32px;
    bottom: 0;
    width: 2px;
    background: var(--border);
  }
  .phase-dot {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem;
    flex-shrink: 0;
    border: 2px solid var(--border);
    background: var(--surface2);
    position: relative;
    z-index: 1;
  }
  .phase-dot.active { border-color: var(--accent); background: rgba(108,99,255,0.2); }
  .phase-dot.done { border-color: var(--success); background: rgba(0,212,170,0.2); }
  .phase-body { flex: 1; padding-top: 4px; }
  .phase-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 2px; }
  .phase-dates { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 4px; }
  .phase-focus { font-size: 0.78rem; color: var(--text-muted); line-height: 1.4; }

  /* Forms / Modals */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 20px;
    width: 100%;
    max-width: 600px;
    max-height: 85vh;
    overflow-y: auto;
  }
  .modal-title { font-size: 1rem; font-weight: 700; margin-bottom: 16px; display: flex; justify-content: space-between; }
  .modal-close { background: none; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: 10px 12px;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--accent); }
  .btn {
    width: 100%;
    padding: 12px;
    border-radius: var(--radius-sm);
    border: none;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #5a52e0; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); margin-top: 8px; }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: white;
    font-size: 1.4rem;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(108,99,255,0.4);
    display: flex; align-items: center; justify-content: center;
    z-index: 50;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .fab:hover { transform: scale(1.08); box-shadow: 0 6px 24px rgba(108,99,255,0.5); }

  /* Income banner */
  .income-banner {
    background: linear-gradient(135deg, rgba(108,99,255,0.15) 0%, rgba(0,212,170,0.1) 100%);
    border: 1px solid rgba(108,99,255,0.3);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .income-label { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .income-val { font-size: 1.5rem; font-weight: 800; color: var(--accent); }
  .income-cycle { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }

  /* Empty state */
  .empty { text-align: center; padding: 30px; color: var(--text-muted); font-size: 0.85rem; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 84px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 16px;
    font-size: 0.8rem;
    opacity: 0;
    transition: all 0.3s;
    z-index: 300;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Month selector */
  .month-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: 8px 12px;
    font-size: 0.8rem;
    outline: none;
    margin-bottom: 12px;
    width: 100%;
  }

  /* Locked overlay */
  .locked { opacity: 0.5; pointer-events: none; }
  .locked-msg { text-align: center; font-size: 0.75rem; color: var(--text-muted); padding: 8px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>💴 <span>Kakeibo</span></h1>
      <div class="header-sub" id="lastUpdated">Loading...</div>
    </div>
    <button class="sync-btn" onclick="loadData()">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">Sync</span>
    </button>
  </div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="showSection('overview')">Overview</button>
  <button class="nav-btn" onclick="showSection('goals')">Goals</button>
  <button class="nav-btn" onclick="showSection('buckets')">Buckets</button>
  <button class="nav-btn" onclick="showSection('actuals')">Actuals</button>
  <button class="nav-btn" onclick="showSection('phases')">Phases</button>
</nav>

<div class="content">

  <!-- OVERVIEW -->
  <div class="section active" id="section-overview">
    <div class="income-banner">
      <div>
        <div class="income-label">Monthly Take-Home</div>
        <div class="income-val" id="ov-income">—</div>
        <div class="income-cycle">14th → 13th cycle</div>
      </div>
      <div style="text-align:right">
        <div class="income-label">Allocated</div>
        <div class="income-val" id="ov-allocated" style="font-size:1.1rem">—</div>
        <div class="income-cycle" id="ov-diff">—</div>
      </div>
    </div>

    <div class="stat-grid">
      <div class="stat-box">
        <div class="stat-label">Japan Fund</div>
        <div class="stat-value purple" id="ov-japan">—</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Car Remaining</div>
        <div class="stat-value yellow" id="ov-car">—</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Emergency Fund</div>
        <div class="stat-value green" id="ov-emergency">—</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Current Phase</div>
        <div class="stat-value" style="font-size:0.8rem" id="ov-phase">—</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><span>🇯🇵</span>Japan Progress</div>
      <div class="progress-wrap" id="ov-japan-bar"></div>
    </div>

    <div class="card">
      <div class="card-title"><span>🚗</span>Car Repayment</div>
      <div class="progress-wrap" id="ov-car-bar"></div>
    </div>

    <div class="card">
      <div class="card-title"><span>🛡️</span>Emergency Fund</div>
      <div class="progress-wrap" id="ov-emerg-bar"></div>
    </div>
  </div>

  <!-- GOALS -->
  <div class="section" id="section-goals">
    <div id="goals-list"></div>
  </div>

  <!-- BUCKETS -->
  <div class="section" id="section-buckets">
    <div class="card">
      <div class="card-title"><span>🪣</span>Saving Buckets</div>
      <div id="buckets-list"></div>
    </div>
  </div>

  <!-- ACTUALS -->
  <div class="section" id="section-actuals">
    <select class="month-select" id="month-select" onchange="renderActuals()"></select>
    <div class="card">
      <div class="card-title"><span>📊</span>Budget vs Actual</div>
      <div id="actuals-list"></div>
    </div>
    <button class="btn btn-secondary" onclick="openActualsModal()">+ Enter Actuals</button>
    <button class="btn btn-secondary" id="new-month-btn" onclick="startNewMonth()" style="margin-top:8px">📅 Start New Month</button>
  </div>

  <!-- PHASES -->
  <div class="section" id="section-phases">
    <div class="card">
      <div class="card-title"><span>🗺️</span>Phase Plan</div>
      <div id="phases-list"></div>
    </div>
  </div>

</div>

<!-- FAB -->
<button class="fab" id="fab" onclick="openFab()">＋</button>

<!-- MODAL: Quick Update -->
<div class="modal-overlay" id="modal-update">
  <div class="modal">
    <div class="modal-title">
      Quick Update
      <button class="modal-close" onclick="closeModal('modal-update')">✕</button>
    </div>
    <div id="modal-update-body"></div>
  </div>
</div>

<!-- MODAL: Actuals Entry -->
<div class="modal-overlay" id="modal-actuals">
  <div class="modal">
    <div class="modal-title">
      Enter Actuals
      <button class="modal-close" onclick="closeModal('modal-actuals')">✕</button>
    </div>
    <div id="modal-actuals-body"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbwj3VLdaMa-UFgSpZFxGPUN4jOwQg-Fj8vQTTZkUfCdEYtymOCV3mBcnH2PqYHlO5EQXQ/exec';
let DATA = {};
let currentSection = 'overview';

// ── API ──────────────────────────────────────────────
async function loadData() {
  setSyncState('loading');
  try {
    const r = await fetch(API + '?action=read');
    DATA = await r.json();
    setSyncState('ok');
    renderAll();
    showToast('Synced ✓');
  } catch(e) {
    setSyncState('error');
    showToast('Sync failed — check connection');
  }
}

async function postData(body) {
  const r = await fetch(API, {
    method: 'POST',
    body: JSON.stringify(body)
  });
  return r.json();
}

async function stampLastUpdated() {
  await postData({ action: 'updateConfig', key: 'last_updated', value: new Date().toISOString() });
}

function setSyncState(s) {
  const dot = document.getElementById('syncDot');
  const label = document.getElementById('syncLabel');
  dot.className = 'sync-dot' + (s === 'loading' ? ' loading' : s === 'error' ? ' error' : '');
  label.textContent = s === 'loading' ? 'Syncing...' : 'Sync';
}

// ── RENDER ───────────────────────────────────────────
function renderAll() {
  renderOverview();
  renderGoals();
  renderBuckets();
  renderActualsSection();
  renderPhases();
  updateLastUpdated();
}

function fmt(n) { return '$' + Number(n).toLocaleString('en-AU', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function pct(a,b) { return b > 0 ? Math.min(100, Math.round((a/b)*100)) : 0; }

function makeBar(current, target, color) {
  const p = pct(current, target);
  return `
    <div class="progress-bar">
      <div class="progress-fill" style="width:${p}%;background:${color}"></div>
    </div>
    <div class="progress-detail">
      <span><strong>${fmt(current)}</strong> saved</span>
      <span><strong>${p}%</strong> of ${fmt(target)}</span>
    </div>`;
}

function renderOverview() {
  const cfg = arrToMap(DATA.Config || [], 'key', 'value');
  const goals = DATA.Goals || [];
  const japan = goals.find(g => g.name === 'Japan') || {};
  const car = goals.find(g => g.name === 'Car') || {};
  const emerg = goals.find(g => g.name === 'Yasuragi') || {};
  const phases = DATA.Phases || [];
  const activePhase = phases.find(p => p.status === 'active') || {};

  const income = Number(cfg.income || 0);
  const buckets = DATA.Buckets || [];
  const expenses = DATA.Expenses || [];
  const allocated = buckets.reduce((s, b) => s + Number(b.monthly_allocation || 0), 0)
                  + expenses.reduce((s, e) => s + Number(e.monthly || 0), 0);
  const diff = income - allocated;

  document.getElementById('ov-income').textContent = fmt(income);
  document.getElementById('ov-allocated').textContent = fmt(allocated);
  const diffEl = document.getElementById('ov-diff');
  diffEl.textContent = (diff >= 0 ? '+' : '') + fmt(diff);
  diffEl.style.color = diff >= 0 ? 'var(--success)' : 'var(--danger)';

  document.getElementById('ov-japan').textContent = fmt(japan.current || 0);
  document.getElementById('ov-car').textContent = fmt(car.current > 0 ? Number(car.target) - Number(car.current) : car.target || 0);
  document.getElementById('ov-emergency').textContent = fmt(emerg.current || 0);
  document.getElementById('ov-phase').textContent = activePhase.phase || '—';

  document.getElementById('ov-japan-bar').innerHTML = makeBar(japan.current || 0, japan.target || 7000, 'var(--accent)');
  const carPaid = Number(car.current || 0);
  const carTotal = Number(car.target || 10300);
  document.getElementById('ov-car-bar').innerHTML = makeBar(carPaid, carTotal, 'var(--warning)');
  document.getElementById('ov-emerg-bar').innerHTML = makeBar(emerg.current || 0, emerg.target || 6000, 'var(--success)');
}

function renderGoals() {
  const goals = DATA.Goals || [];
  const phases = DATA.Phases || [];
  const activePhase = (phases.find(p => p.status === 'active') || {}).phase || '';

  const icons = { Japan: '🇯🇵', Car: '🚗', Yasuragi: '🛡️', Odyssey: '📈' };
  const colors = { Japan: 'var(--accent)', Car: 'var(--warning)', Yasuragi: 'var(--success)', Odyssey: 'var(--accent2)' };
  const badges = {
    Japan: activePhase.includes('Japan') ? 'active' : 'done',
    Car: activePhase.includes('Car') || activePhase.includes('Japan') ? (activePhase.includes('Japan') ? 'active' : 'active') : 'upcoming',
    Yasuragi: 'upcoming',
    Odyssey: 'paused'
  };

  const html = goals.map(g => {
    const p = pct(g.current, g.target);
    const badge = badges[g.name] || 'upcoming';
    const remaining = Math.max(0, Number(g.target) - Number(g.current));
    const monthsLeft = g.monthly_contribution > 0 ? Math.ceil(remaining / g.monthly_contribution) : '—';
    const isOdyssey = g.name === 'Odyssey';

    return `<div class="goal-card ${isOdyssey ? 'locked' : ''}">
      <div class="goal-header">
        <div class="goal-name">${icons[g.name] || ''} ${g.name}</div>
        <div class="goal-badge badge-${badge}">${badge}</div>
      </div>
      ${isOdyssey ? '<div class="locked-msg">Starts after emergency fund hits $6,000</div>' : `
      <div class="progress-bar" style="margin-bottom:6px">
        <div class="progress-fill" style="width:${p}%;background:${colors[g.name]}"></div>
      </div>
      <div class="progress-detail">
        <span><strong>${fmt(g.current)}</strong> / ${fmt(g.target)}</span>
        <span><strong>${p}%</strong></span>
      </div>
      <div class="stat-grid" style="margin-top:10px">
        <div class="stat-box"><div class="stat-label">Remaining</div><div class="stat-value" style="font-size:0.95rem">${fmt(remaining)}</div></div>
        <div class="stat-box"><div class="stat-label">Months Left</div><div class="stat-value" style="font-size:0.95rem">${monthsLeft}</div></div>
      </div>
      <button class="btn btn-secondary" style="margin-top:10px;font-size:0.8rem;padding:8px" onclick="openGoalUpdate('${g.name}')">Update Balance</button>
      `}
    </div>`;
  }).join('');
  document.getElementById('goals-list').innerHTML = html;
}

function renderBuckets() {
  const buckets = DATA.Buckets || [];
  const emojis = { Japan: '🇯🇵', Car: '🚗', Yasuragi: '🛡️', Splurge: '🎉', Phoenix: '🔥' };
  const purposes = { Japan: 'Trip + proposal', Car: 'Loan to Mum', Yasuragi: 'Emergency fund', Splurge: 'Guilt-free', Phoenix: 'Irregular costs' };

  const html = buckets.map(b => `
    <div class="bucket-row">
      <div class="bucket-left">
        <div class="bucket-name">${emojis[b.name] || ''} ${b.name}</div>
        <div class="bucket-sub">${purposes[b.name] || ''}</div>
      </div>
      <div class="bucket-right">
        <div class="bucket-alloc">${fmt(b.monthly_allocation)}/mo</div>
        <div class="bucket-balance" style="color:var(--accent)">${fmt(b.current_balance)}</div>
        <div style="font-size:0.65rem;color:var(--text-muted);cursor:pointer;margin-top:2px" onclick="openBucketUpdate('${b.name}')">edit</div>
      </div>
    </div>`).join('');
  document.getElementById('buckets-list').innerHTML = html;
}

function renderActualsSection() {
  const actuals = DATA.Actuals || [];
  const months = [...new Set(actuals.map(a => a.month))].sort().reverse();
  const sel = document.getElementById('month-select');
  const current = sel.value;
  sel.innerHTML = months.map(m => `<option value="${m}" ${m===current?'selected':''}>${formatMonth(m)}</option>`).join('');
  if (!sel.value && months.length) sel.value = months[0];
  renderActuals();
}

function renderActuals() {
  const month = document.getElementById('month-select').value;
  const actuals = (DATA.Actuals || []).filter(a => a.month === month);

  if (!actuals.length) {
    document.getElementById('actuals-list').innerHTML = '<div class="empty">No data for this month</div>';
    return;
  }

  let totalBudget = 0, totalActual = 0;
  const html = actuals.map(a => {
    const budgeted = Number(a.budgeted || 0);
    const actual = a.actual !== '' && a.actual !== undefined ? Number(a.actual) : null;
    totalBudget += budgeted;
    if (actual !== null) totalActual += actual;
    const diff = actual !== null ? actual - budgeted : null;
    return `
      <div class="actual-row">
        <div class="actual-cat">${a.category}</div>
        <div class="actual-right">
          <div class="actual-budget">${fmt(budgeted)}</div>
          <div class="actual-val" style="color:${actual === null ? 'var(--text-muted)' : diff > 0 ? 'var(--danger)' : 'var(--success)'}">${actual !== null ? fmt(actual) : '—'}</div>
          ${diff !== null ? `<div class="actual-diff ${diff > 0 ? 'diff-over' : 'diff-under'}">${diff > 0 ? '▲' : '▼'}${fmt(Math.abs(diff))}</div>` : ''}
        </div>
      </div>`;
  }).join('');

  const sumDiff = totalActual - totalBudget;
  document.getElementById('actuals-list').innerHTML = html + `
    <div class="actual-row" style="border-top:1px solid var(--accent);margin-top:4px;padding-top:12px">
      <div class="actual-cat" style="font-weight:700">Total</div>
      <div class="actual-right">
        <div class="actual-budget">${fmt(totalBudget)}</div>
        <div class="actual-val">${totalActual > 0 ? fmt(totalActual) : '—'}</div>
        ${totalActual > 0 ? `<div class="actual-diff ${sumDiff > 0 ? 'diff-over' : 'diff-under'}">${sumDiff > 0 ? '▲' : '▼'}${fmt(Math.abs(sumDiff))}</div>` : ''}
      </div>
    </div>`;
}

function renderPhases() {
  const phases = DATA.Phases || [];
  const dotIcons = { active: '⚡', upcoming: '○', done: '✓' };
  const html = phases.map(p => `
    <div class="phase-item">
      <div class="phase-dot ${p.status}">${dotIcons[p.status] || '○'}</div>
      <div class="phase-body">
        <div class="phase-name">${p.phase}</div>
        <div class="phase-dates">${formatMonth(p.start)} ${p.end ? '→ ' + formatMonth(p.end) : '→ ongoing'}</div>
        <div class="phase-focus">${p.focus}</div>
      </div>
    </div>`).join('');
  document.getElementById('phases-list').innerHTML = html;
}

// ── MODALS ───────────────────────────────────────────
function openFab() {
  const body = `
    <div class="field"><label>Update Japan Balance (${fmt((DATA.Goals||[]).find(g=>g.name==='Japan')?.current||0)})</label>
    <input type="number" id="fab-japan" placeholder="New total saved" step="0.01"></div>
    <div class="field"><label>Update Car Paid (${fmt((DATA.Goals||[]).find(g=>g.name==='Car')?.current||0)})</label>
    <input type="number" id="fab-car" placeholder="Total paid so far" step="0.01"></div>
    <div class="field"><label>Update Emergency Fund (${fmt((DATA.Goals||[]).find(g=>g.name==='Yasuragi')?.current||0)})</label>
    <input type="number" id="fab-emerg" placeholder="Current balance" step="0.01"></div>
    <button class="btn btn-primary" onclick="saveFab()">Save Updates</button>`;
  document.getElementById('modal-update-body').innerHTML = body;
  document.getElementById('modal-update').classList.add('open');
}

async function saveFab() {
  const japan = document.getElementById('fab-japan').value;
  const car = document.getElementById('fab-car').value;
  const emerg = document.getElementById('fab-emerg').value;
  const updates = [];
  if (japan) updates.push(postData({action:'updateGoal', name:'Japan', field:'current', value:Number(japan)}));
  if (car) updates.push(postData({action:'updateGoal', name:'Car', field:'current', value:Number(car)}));
  if (emerg) updates.push(postData({action:'updateGoal', name:'Yasuragi', field:'current', value:Number(emerg)}));
  if (!updates.length) { closeModal('modal-update'); return; }
  showToast('Saving...');
  await Promise.all(updates);
  await stampLastUpdated();
  await loadData();
  closeModal('modal-update');
  showToast('Saved ✓');
}

function openGoalUpdate(name) {
  const goal = (DATA.Goals||[]).find(g => g.name === name) || {};
  const body = `
    <div class="field"><label>Current Balance for ${name}</label>
    <input type="number" id="goal-val" value="${goal.current || 0}" step="0.01"></div>
    <button class="btn btn-primary" onclick="saveGoalUpdate('${name}')">Save</button>`;
  document.getElementById('modal-update-body').innerHTML = body;
  document.getElementById('modal-update').classList.add('open');
}

async function saveGoalUpdate(name) {
  const val = document.getElementById('goal-val').value;
  showToast('Saving...');
  await postData({action:'updateGoal', name, field:'current', value:Number(val)});
  await stampLastUpdated();
  await loadData();

}

function openBucketUpdate(name) {
  const b = (DATA.Buckets||[]).find(x => x.name === name) || {};
  const body = `
    <div class="field"><label>Current Balance for ${name} Bucket</label>
    <input type="number" id="bucket-val" value="${b.current_balance || 0}" step="0.01"></div>
    <button class="btn btn-primary" onclick="saveBucketUpdate('${name}')">Save</button>`;

  document.getElementById('modal-update').classList.add('open');
}

async function saveBucketUpdate(name) {
  const val = document.getElementById('bucket-val').value;
  showToast('Saving...');
  await postData({action:'updateBucket', name, field:'current_balance', value:Number(val)});
  await stampLastUpdated();
  await loadData();
  closeModal('modal-update');
  showToast('Saved ✓');
}

function openActualsModal() {
  const month = document.getElementById('month-select').value;
  const actuals = (DATA.Actuals||[]).filter(a => a.month === month);
  const fields = actuals.map(a => `
    <div class="field">
      <label>${a.category} (budget: ${fmt(a.budgeted)})</label>
      <input type="number" class="actual-input" data-cat="${a.category}" value="${a.actual || ''}" placeholder="Actual spent" step="0.01">
    </div>`).join('');
  document.getElementById('modal-actuals-body').innerHTML = `
    <div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:12px">${formatMonth(month)}</div>
    ${fields}
    <button class="btn btn-primary" onclick="saveActuals('${month}')">Save All</button>`;
  document.getElementById('modal-actuals').classList.add('open');
}

async function saveActuals(month) {
  const inputs = document.querySelectorAll('.actual-input');
  const saves = [];
  inputs.forEach(inp => {
    if (inp.value !== '') {
      saves.push(postData({action:'updateActual', month, category:inp.dataset.cat, actual:Number(inp.value)}));
    }
  });
  showToast('Saving...');
  await Promise.all(saves);
  await stampLastUpdated();
  await loadData();
  closeModal('modal-actuals');
  showToast('Actuals saved ✓');
}

async function startNewMonth() {
  // Current month in YYYY-MM format
  const now = new Date();
  const newMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  // Check if already exists
  const existing = (DATA.Actuals || []).filter(a => a.month === newMonth);
  if (existing.length > 0) {
    showToast(`${formatMonth(newMonth)} already exists`);
    return;
  }

  // Build rows from Expenses
  const expenses = DATA.Expenses || [];
  const buckets = DATA.Buckets || [];
  const splurge = buckets.find(b => b.name === 'Splurge');
  const phoenix = buckets.find(b => b.name === 'Phoenix');

  const rows = [];
  expenses.forEach(e => {
    rows.push({ month: newMonth, category: e.name, budgeted: e.monthly, actual: '' });
  });
  if (splurge) rows.push({ month: newMonth, category: 'Splurge', budgeted: splurge.monthly_allocation, actual: '' });
  if (phoenix) rows.push({ month: newMonth, category: 'Phoenix', budgeted: phoenix.monthly_allocation, actual: '' });

  showToast('Creating new month...');
  for (const row of rows) {
    await postData({ action: 'appendActual', row });
  }
  await stampLastUpdated();
  await loadData();

  // Switch to new month
  document.getElementById('month-select').value = newMonth;
  renderActuals();
  showToast(`${formatMonth(newMonth)} created ✓`);
}

// ── UTILS ────────────────────────────────────────────
function showSection(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('section-' + name).classList.add('active');
  event.target.classList.add('active');
  currentSection = name;
  document.getElementById('fab').style.display = ['overview','goals','buckets'].includes(name) ? 'flex' : 'none';
}

function arrToMap(arr, key, val) {
  const m = {};
  arr.forEach(r => m[r[key]] = r[val]);
  return m;
}

function formatMonth(m) {
  if (!m) return '';
  const [y, mo] = m.split('-');
  return new Date(y, mo-1).toLocaleString('en-AU', {month:'short', year:'numeric'});
}

function updateLastUpdated() {
  const cfg = arrToMap(DATA.Config || [], 'key', 'value');
  const raw = cfg.last_updated;
  let display = '—';
  if (raw) {
    const d = new Date(raw);
    if (!isNaN(d)) {
      const day = String(d.getDate()).padStart(2,'0');
      const mon = String(d.getMonth()+1).padStart(2,'0');
      const yr = d.getFullYear();
      let hrs = d.getHours();
      const mins = String(d.getMinutes()).padStart(2,'0');
      const ampm = hrs >= 12 ? 'PM' : 'AM';
      hrs = hrs % 12 || 12;
      display = `${day}-${mon}-${yr} ${hrs}:${mins}${ampm}`;
    } else {
      display = raw;
    }
  }
  document.getElementById('lastUpdated').textContent = 'Last Updated: ' + display;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});

// Init
loadData();
</script>
